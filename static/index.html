<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial Equation Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background bubbles -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
    
    <main class="container">
        <header class="animate-fade-in-up">
            <div class="header-badge"><i class="fa-solid fa-bolt text-accent"></i> API v1.0.0</div>
            <h1>Polynomial <span class="gradient-text">Solver Engine</span></h1>
            <p>Advanced numerical computing with instant visualizations</p>
        </header>

        <section class="solver-card animate-fade-in-up" style="animation-delay: 0.1s;">
            <div class="input-group">
                <label for="coefficients"><i class="fa-solid fa-calculator"></i> Matrix Coefficients</label>
                <div class="input-wrapper">
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="coefficients" placeholder="1 -5 6 (For x² - 5x + 6 = 0)" autocomplete="off">
                    </div>
                    <button id="solve-btn" class="glow-button">
                        <span>Compute Roots</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
                <div class="quick-examples">
                    <small>Try: </small>
                    <span class="badge example-badge" onclick="document.getElementById('coefficients').value='1 -3 2'; document.getElementById('solve-btn').click();">x² - 3x + 2</span>
                    <span class="badge example-badge" onclick="document.getElementById('coefficients').value='1 0 1'; document.getElementById('solve-btn').click();">x² + 1</span>
                    <span class="badge example-badge" onclick="document.getElementById('coefficients').value='1 0 -1 0'; document.getElementById('solve-btn').click();">x³ - x</span>
                </div>
            </div>
        </section>

        <div id="results-container" class="hidden">
            <section class="results-grid">
                <div class="results-left animate-slide-in-left">
                    <div class="card roots-card premium-card">
                        <div class="card-header">
                            <h3><i class="fa-solid fa-square-root-variable"></i> Calculated Roots</h3>
                            <div class="metadata-badges">
                                <span class="badge solid-badge badge-primary" id="degree-tag">Degree: 2</span>
                                <span class="badge solid-badge badge-accent" id="type-tag">Type: Real</span>
                            </div>
                        </div>
                        <div id="roots-list"></div>
                    </div>

                    <div id="explanation-card" class="card premium-card hidden animate-slide-in-left" style="animation-delay: 0.2s; margin-top: 2rem;">
                        <div class="card-header">
                            <h3><i class="fa-solid fa-list-ol"></i> Algebraic Steps</h3>
                        </div>
                        <div id="steps-content" class="code-font"></div>
                    </div>
                </div>

                <div class="results-right animate-slide-in-right">
                    <div class="card graph-card premium-card">
                        <div class="card-header">
                            <h3><i class="fa-solid fa-chart-line"></i> Curve Visualization</h3>
                        </div>
                        <div id="graph-container">
                            <img id="polynomial-graph" src="" alt="Polynomial Graph">
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="loader" class="hidden">
            <div class="premium-spinner"></div>
            <p class="loader-text">Executing Tensor Math...</p>
        </div>
    </main>

    <footer>
        <p>Built with <i class="fa-brands fa-python text-accent"></i> Python & Flask &bull; <a href="/apidocs" target="_blank" class="docs-link"><i class="fa-solid fa-code"></i> Developer API</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
